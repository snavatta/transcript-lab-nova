services:
  transcriptlab:
    build:
      context: .
    ports:
      - "5000:5000"
    volumes:
      - transcriptlab-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Storage__BasePath=/data
      - ConnectionStrings__DefaultConnection=Data Source=/data/transcriptlab.db

volumes:
  transcriptlab-data:
