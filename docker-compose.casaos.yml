name: transcriptlab-nova

services:
  transcriptlab:
    image: ghcr.io/snavatta/transcriptlab-nova-openvino:latest
    container_name: transcriptlab
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Storage__BasePath: /data
      ConnectionStrings__DefaultConnection: "Data Source=/data/transcriptlab.db"
      Transcription__OpenVinoWhisperSidecar__Device: GPU
    volumes:
      - /DATA/AppData/$$AppID/data:/data
    devices:
      # Expose the full Intel DRM stack so OpenVINO can reach renderD* and card* nodes.
      - /dev/dri:/dev/dri

x-casaos:
  architectures:
    - amd64
  main: transcriptlab
  category: Media
  index: /
  port_map: "5000"
  scheme: http
  title:
    en_us: TranscriptLab Nova
  tagline:
    en_us: Self-hosted transcription workspace for recorded classes and lectures
